services:
  # 1. The Backend (API)
  - type: web
    name: findash-api-manish
    env: node
    plan: free
    rootDir: server
    # We add 'ls' to debug if paths are correct
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        value: "file:./dev.db"

  # 2. The Frontend (UI)
  - type: web
    name: findash-ui-manish
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: findash-api-manish
          type: web
          property: host