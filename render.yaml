services:
  # 1. The Backend (API)
  - type: web
    name: findash-api-manish
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000

  # 2. The Frontend (UI)
  - type: static
    name: findash-ui-manish
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    publishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: findash-api-manish
          type: web
          property: host